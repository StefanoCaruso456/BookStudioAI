name: Deploy (Production)

# Builds and deploys to Vercel production on every push to main — but only
# after typecheck + tests pass. Running the deploy here (instead of via Vercel's
# native Git integration) means the deploy's success or failure shows up as a
# GitHub Actions run with full build logs, right alongside the test results.
#
# Requires three repository secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - a Vercel access token (Vercel -> Account Settings -> Tokens)
#   VERCEL_ORG_ID      - from .vercel/project.json after `vercel link`, or team settings
#   VERCEL_PROJECT_ID  - from .vercel/project.json, or Project Settings -> General
#
# Vercel's own auto-deploy for `main` is disabled in vercel.json so the two
# don't race / double-deploy. Preview deploys for PR branches are unaffected.

on:
  push:
    branches: [main]

# Never let two production deploys run at once; newest push wins.
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Test & deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
