name: CI

# Quality gate that runs on every PR and on pushes to main.
# Vercel handles the actual deploy (preview on PRs, production on main).
# This workflow just makes sure the code type-checks, tests, and builds before that.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
