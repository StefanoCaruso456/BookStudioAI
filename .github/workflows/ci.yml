name: CI

# Quality gate for pull requests targeting main.
# Production deploys to Vercel run from deploy.yml (on push to main), which
# re-runs typecheck + tests before deploying, so we don't duplicate that here.

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
